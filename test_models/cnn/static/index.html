<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تشخیص گربه یا سگ با هوش مصنوعی</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 520px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .header {
      background: #6b48ff;
      color: white;
      padding: 24px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .content {
      padding: 28px 24px;
    }

    .upload-area {
      border: 3px dashed #c3c9ff;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      background: #fafaff;
      margin-bottom: 24px;
    }

    .upload-area:hover {
      border-color: #6b48ff;
      background: #f5f5ff;
    }

    .upload-area.dragover {
      border-color: #6b48ff;
      background: #eceaff;
      box-shadow: 0 0 15px rgba(107, 72, 255, 0.3);
    }

    #imageInput {
      display: none;
    }

    .preview-container {
      margin: 20px 0;
      text-align: center;
    }

    #preview {
      max-width: 100%;
      max-height: 320px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: none;
      object-fit: contain;
    }

    .btn {
      background: #6b48ff;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      margin: 16px 0;
      display: inline-block;
    }

    .btn:hover {
      background: #5a3de6;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(107, 72, 255, 0.3);
    }

    .btn:disabled {
      background: #a8a8a8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #result {
      margin-top: 28px;
      padding: 20px;
      border-radius: 12px;
      background: #f8f9ff;
      min-height: 100px;
      font-size: 1.4rem;
      text-align: center;
      transition: all 0.4s ease;
    }

    #result:empty {
      display: none;
    }

    .cat  { color: #9f4bff; }
    .dog  { color: #ff6b6b; }
    .emoji { font-size: 2.2rem; margin-left: 8px; }

    .loading {
      color: #6b48ff;
      font-style: italic;
    }

    .error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
    }

    @media (max-width: 500px) {
      .container { margin: 20px auto; }
      .content { padding: 20px; }
      .header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>گربه یا سگ؟</h1>
    <p>عکس حیوان خانگی‌ات رو آپلود کن تا بگم چیه!</p>
  </div>

  <div class="content">
    <label for="imageInput">
      <div class="upload-area" id="uploadArea">
        <p>عکس رو اینجا بکش و رها کن<br>یا کلیک کن و فایل رو انتخاب کن</p>
        <small>فرمت‌های مجاز: jpg, jpeg, png</small>
      </div>
    </label>

    <input type="file" id="imageInput" accept="image/jpeg, image/png, image/jpg">

    <div class="preview-container">
      <img id="preview" alt="پیش‌نمایش تصویر">
    </div>

    <button class="btn" id="predictBtn" disabled>تشخیص بده</button>

    <div id="result"></div>
  </div>
</div>

<script>
  const imageInput = document.getElementById('imageInput');
  const preview = document.getElementById('preview');
  const predictBtn = document.getElementById('predictBtn');
  const resultDiv = document.getElementById('result');
  const uploadArea = document.getElementById('uploadArea');

  // نمایش پیش‌نمایش تصویر
  function showPreview(file) {
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = function(e) {
        preview.src = e.target.result;
        preview.style.display = 'block';
        predictBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }
  }

  // وقتی فایل انتخاب شد
  imageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) showPreview(file);
  });

  // Drag & Drop
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });

  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });

  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      imageInput.files = e.dataTransfer.files;
      showPreview(file);
    }
  });

  // کلیک روی دکمه تشخیص
  predictBtn.addEventListener('click', async () => {
    const file = imageInput.files[0];
    if (!file) return;

    resultDiv.innerHTML = '<span class="loading">در حال تشخیص...</span>';
    predictBtn.disabled = true;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const response = await fetch('/predict', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      if (response.ok && !data.error) {
        const isDog = data.is_dog || data.label.toLowerCase().includes('dog');
        const emoji = isDog ? '🐶' : '🐱';
        const className = isDog ? 'سگ' : 'گربه';

        resultDiv.innerHTML = `
          <span class="${className}">${emoji} ${data.label}</span><br>
          <span style="font-size:1.1rem; opacity:0.9;">
           
          </span>
        `;
      } else {
        resultDiv.innerHTML = `<div class="error">خطا: ${data.error || 'مشکلی پیش آمد'}</div>`;
      }
    } catch (err) {
      resultDiv.innerHTML = '<div class="error">اتصال به سرور برقرار نشد!</div>';
      console.error(err);
    }

    predictBtn.disabled = false;
  });
</script>

</body>
</html>
